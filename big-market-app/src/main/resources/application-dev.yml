# ========================= 服务器基础配置 =========================
server:
  port: 8091
  tomcat:
    threads:
      max: 200              # 开发环境Tomcat最大线程数
      min-spare: 50         # 开发环境最小空闲线程数
    accept-count: 10        # 开发环境请求队列长度

# ========================= 应用自定义配置 =========================
app:
  config:
    api-version: v1         # 接口版本号
    cross-origin: '*'       # 开发环境允许所有域名跨域

# ========================= 自定义线程池配置 =========================
thread:
  pool:
    executor:
      config:
        core-pool-size: 20          # 核心线程数
        max-pool-size: 50           # 最大线程数
        keep-alive-time: 5000       # 非核心线程空闲时间(ms)
        block-queue-size: 5000      # 任务队列容量
        policy: CallerRunsPolicy   # 拒绝策略：调用方执行

# ========================= Spring核心配置 =========================
spring:
  main:
    allow-bean-definition-overriding: true  # 允许Bean覆盖

  # ========================= RabbitMQ 配置（修复地址格式） =========================
  rabbitmq:
    addresses: 192.168.21.130:5672  # 正确写法：地址+端口，无需单独写port
    username: admin
    password: admin
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        prefetch: 1                  # 开发环境预取数=1（便于调试）
    topic:
      activity_sku_stock:
        exchange: activity_sku_stock_exchange
        routing-key: activity_sku_stock_routing_key
        queue: activity_sku_stock_queue
      send_award:
        exchange: send_award_exchange
        routing-key: send_award_routing_key
        queue: send_award_queue
      send_rebate:
        exchange: send_rebate_exchange
        routing-key: send_rebate_routing_key
        queue: send_rebate_queue
      credit_adjust_success:
        exchange: credit_adjust_success_exchange
        routing-key: credit_adjust_success_routing_key
        queue: credit_adjust_success_queue

  # ========================= Elasticsearch 配置 =========================
  elasticsearch:
    datasource:
      driverClassName: org.elasticsearch.xpack.sql.jdbc.EsDriver
      url: jdbc:es://http://192.168.21.130:9200

  # ========================= 分库分表（ShardingSphere）配置 =========================
  shardingsphere:
    datasource:
      names: ds_0,ds_1,big_market
      # 分库01 - 用户私有数据（修复时区为上海）
      ds_0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://192.168.21.130:13306/big_market_01?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456  # 开发环境暂用硬编码，生产必须替换
      # 分库02 - 用户私有数据（修复时区为上海）
      ds_1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://192.168.21.130:13306/big_market_02?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456
      # 默认库 - 公共基础数据（修复时区为上海）
      big_market:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://192.168.21.130:13306/big_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456
    rules:
      sharding:
        default-data-source-name: big_market
        tables:
          # 分库+分表 - 用户抽奖订单表
          user_raffle_order:
            actual-data-nodes: ds_${0..1}.user_raffle_order_00${0..3}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_tbl_alg
          # 分库+分表 - 抽奖活动订单表
          raffle_activity_order:
            actual-data-nodes: ds_${0..1}.raffle_activity_order_00${0..3}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_tbl_alg
          # 分库+分表 - 用户中奖记录表
          user_award_record:
            actual-data-nodes: ds_${0..1}.user_award_record_00${0..3}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_tbl_alg
          # 分库+分表 - 用户行为返利订单表
          user_behavior_rebate_order:
            actual-data-nodes: ds_${0..1}.user_behavior_rebate_order_00${0..3}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_tbl_alg
          # 分库+分表 - 积分流水表
          user_credit_order:
            actual-data-nodes: ds_${0..1}.user_credit_order_00${0..3}
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
            table-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_tbl_alg
          # 仅分库 - 抽奖账户总表
          raffle_activity_account:
            actual-data-nodes: ds_${0..1}.raffle_activity_account
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
          # 仅分库 - 抽奖账户月表
          raffle_activity_account_month:
            actual-data-nodes: ds_${0..1}.raffle_activity_account_month
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
          # 仅分库 - 抽奖账户日表
          raffle_activity_account_day:
            actual-data-nodes: ds_${0..1}.raffle_activity_account_day
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
          # 仅分库 - 积分账户表
          user_credit_account:
            actual-data-nodes: ds_${0..1}.user_credit_account
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
          # 仅分库 - 异步任务表
          task:
            actual-data-nodes: ds_${0..1}.task
            database-strategy:
              standard:
                sharding-column: user_id
                sharding-algorithm-name: sys_user_db_alg
        # 分片算法配置
        sharding-algorithms:
          sys_user_db_alg:
            type: CLASS_BASED
            props:
              strategy: STANDARD
              algorithmClassName: com.c.types.common.MyDatabaseAlgorithm
          sys_user_tbl_alg:
            type: CLASS_BASED
            props:
              strategy: STANDARD
              algorithmClassName: com.c.types.common.MyTableAlgorithm
    props:
      sql-show: true  # 开发环境开启SQL打印（便于调试）

# ========================= MyBatis配置 =========================
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location: classpath:/mybatis/config/mybatis-config.xml

# ========================= Redis配置 =========================
redis:
  sdk:
    config:
      host: 192.168.21.130
      port: 16379
      pool-size: 10
      min-idle-size: 5
      connect-timeout: 5000
      retry-attempts: 3

# ========================= 日志配置 =========================
logging:
  level:
    root: info
    com.c.infrastructure.adapter.repository: debug  # 开发环境打印SQL详情
    org.apache.shardingsphere: info
  config: classpath:logback-spring.xml

# ========================= Dubbo配置 =========================
dubbo:
  application:
    name: big-market
    version: 1.0
    logger: slf4j
  registry:
    id: nacos-registry
    address: nacos://192.168.21.130:8848
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.c.trigger.api

# ========================= Nacos配置 =========================
nacos:
  sdk:
    config:
      server-addr: 192.168.21.130:8848
      registry: 192.168.21.130:8848
      namespace: 5522e941-5541-4512-851e-8711540843e3
      group: DEFAULT_GROUP
      data-id: gateway-api-config
      config-timeout: 5000
      max-retries: 3

# ========================= XXL-Job配置 =========================
xxl:
  job:
    accessToken: default_token
    admin:
      addresses: http://192.168.21.130:9090/xxl-job-admin
    executor:
      address:
      appname: big-market-job
      ip: 10.11.166.210
      port: 9999
      logpath: ./data/applogs/xxl-job/jobhandler
      logretentiondays: 30

# ========================= 健康检查配置 =========================
management:
  health:
    elasticsearch:
      enabled: false